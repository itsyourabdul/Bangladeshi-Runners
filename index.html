<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla GTA - GTA V Style 🇧🇩</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;family=Noto+Sans+Bengali:wght@400;700&amp;display=swap');

        :root {
            --bd-green: #006400;
            --bd-red: #FF0000;
            --bd-gold: #FFD700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(#006400, #228B22);
            font-family: 'Inter', 'Noto Sans Bengali', sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            position: relative;
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 700;
            color: #FFD700;
            text-shadow: 
                4px 4px 0 #FF0000,
                -2px -2px 0 #FF0000;
            margin-bottom: 12px;
            letter-spacing: 4px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        canvas {
            border: 12px solid #FFD700;
            border-radius: 20px;
            box-shadow: 
                0 0 40px rgba(255, 215, 0, 0.6),
                0 0 0 8px #FF0000;
            background: #111;
            max-width: 100%;
            max-height: 90vh;
            touch-action: none;
        }

        .ui {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 1.6rem;
            font-weight: 700;
            color: #FFD700;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 14px 24px;
            border-radius: 15px;
            font-size: 1.1rem;
            text-align: center;
            max-width: 820px;
            line-height: 1.4;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            transition: opacity 0.4s ease;
        }

        .flag {
            font-size: 2.2rem;
            animation: wave 2s infinite;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(-8deg); }
            50% { transform: rotate(8deg); }
        }

        .overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            pointer-events: none;
        }

        .pause-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 15;
            background: rgba(0, 0, 0, 0.6);
            color: #FFD700;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>
    <h1>
        <span class="flag">🇧🇩</span>
        BANGLA GTA
        <span class="flag">🇧🇩</span>
    </h1>

    <canvas id="canvas" width="820" height="480"></canvas>

    <!-- GTA V style UI -->
    <div class="ui" id="ui">
        দূরত্ব: <span id="score">0</span>m 
        <span style="margin-left:20px; color:#FFD700;">💰</span> 
        <span id="mangoCount">0</span>
        <span id="shieldIndicator" style="margin-left:15px; font-size:1.4rem; display:none;">🛡️</span>
    </div>

    <!-- GTA V style instructions -->
    <div class="instructions" id="instructions">
        ← → বা A D → লেন চেঞ্জ<br>
        ↑ বা W বা SPACE → র‍্যাম্প জাম্প / বুস্ট<br>
        ↓ বা S → ড্রিফট / স্লাইড<br>
        💰 টাকা + 🛡️ শিল্ড সংগ্রহ করুন!<br>
        P → পজ করুন • ট্যাপ করে শুরু/রিস্টার্ট<br>
        <span style="font-size:0.9rem; opacity:0.8;">মোবাইলে সোয়াইপ • GTA V এর মতো বাংলাদেশের গ্রাম রাস্তায় গাড়ি চালান!</span>
    </div>

    <!-- Pause button -->
    <div class="pause-btn" id="pauseBtn">⏸️</div>

    <script>
        /**
         * Bangla GTA - FULL GTA V STYLE EDITION
         * 
         * TRANSFORMED INTO GTA V PLAYSTYLE:
         * ✅ Player is now a red sports car (GTA V vibe)
         * ✅ Jump = ramp jump / nitro boost
         * ✅ Slide = handbrake drift
         * ✅ Smooth lane changes (like GTA driving)
         * ✅ Particle system upgraded (exhaust smoke + crash explosions)
         * ✅ Sound effects now include engine rev, horn, crash
         * ✅ Shield = bulletproof armor (temporary invincibility)
         * ✅ Collectibles = cash (💰) instead of just mangoes
         * ✅ Background still Bangladeshi village road but now feels like GTA countryside mission
         * ✅ Start/Game Over screens with GTA "WASTED" flair
         * ✅ Fully playable like an endless GTA V driving mission!
         * 
         * Just copy & play — pure GTA V energy in Bangla village roads 🇧🇩
         */

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        const WIDTH = 820;
        const HEIGHT = 480;
        
        let gameState = 'start'; // start, playing, over
        let score = 0;
        let cash = 0;                    // Changed from mangoes to cash for GTA feel
        let highScore = localStorage.getItem('banglaGTAHS') ? parseInt(localStorage.getItem('banglaGTAHS')) : 0;
        let speed = 6;
        let frame = 0;
        
        let playerLane = 1; // 0 = left, 1 = center, 2 = right
        const laneX = [235, 410, 585];
        let playerX = laneX[1];
        
        let playerJump = 0;
        let playerVel = 0;
        let isSliding = false;
        let slideTimer = 0;
        let playerShield = 0;           // Bulletproof armor
        let cashStreak = 0;
        let lastCashFrame = 0;
        
        let obstacles = [];
        let collectibles = [];
        let particles = [];
        
        let bgOffset = 0;
        let keys = {};
        let isPaused = false;
        
        // Touch variables
        let touchStartX = 0;
        let touchStartY = 0;
        
        // Audio
        let audioCtx;

        // ====================== SOUND SYSTEM (GTA V style) ======================
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(freq, duration = 0.2, waveType = 'sine', volume = 0.4) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.type = waveType;
            gain.gain.value = volume;
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playEngineRev() {
            playSound(180, 0.15, 'sawtooth', 0.7);
            setTimeout(() => playSound(240, 0.3, 'sawtooth', 0.5), 80);
        }

        function playJumpSound() {
            playSound(280, 0.12, 'triangle', 0.8);     // ramp jump
            setTimeout(() => playSound(520, 0.25, 'sine', 0.6), 40);
        }

        function playCollectSound() {
            playSound(780, 0.06, 'sine', 0.7);
            setTimeout(() => playSound(1100, 0.18, 'sine', 0.5), 30);
        }

        function playPowerupSound() {
            playSound(440, 0.1, 'sine', 0.8);
            playSound(660, 0.1, 'sine', 0.8);
            setTimeout(() => playSound(990, 0.4, 'sine', 0.7), 60);
        }

        function playCrashSound() {
            playSound(140, 0.6, 'sawtooth', 0.9);
            setTimeout(() => playSound(80, 0.45, 'sawtooth', 0.6), 120);
        }

        function playDriftSound() {
            playSound(90, 0.35, 'sawtooth', 0.4);
        }

        // ====================== PARTICLES (GTA V crash + exhaust) ======================
        function createExhaustParticles(x, y) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: x - 30,
                    y: y + 15,
                    vx: (Math.random() - 0.8) * 4,
                    vy: 2 + Math.random() * 3,
                    life: 18,
                    size: 4 + Math.random() * 4,
                    color: '#888888'
                });
            }
        }

        function createMangoParticles(x, y) {  // renamed but kept for cash sparkle
            for (let i = 0; i < 28; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 11,
                    vy: (Math.random() - 0.5) * 10 - 5,
                    life: 38,
                    size: 4 + Math.random() * 4,
                    color: '#FFEE00'
                });
            }
        }

        function createExplosion(x, y, color = '#FF5500') {
            for (let i = 0; i < 55; i++) {
                const angle = Math.random() * Math.PI * 2;
                const vel = 4 + Math.random() * 9;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * vel,
                    vy: Math.sin(angle) * vel - 4,
                    life: 28 + Math.random() * 22,
                    size: 5 + Math.random() * 9,
                    color: color
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.25;
                p.vx *= 0.96;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                const alpha = Math.max(0.1, p.life / 32);
                ctx.globalAlpha = alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * 0.55, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        // ====================== GAME LOGIC ======================
        function startGame() {
            initAudio();
            gameState = 'playing';
            score = 0;
            cash = 0;
            speed = 6;
            frame = 0;
            playerLane = 1;
            playerX = laneX[1];
            playerJump = 0;
            playerVel = 0;
            isSliding = false;
            slideTimer = 0;
            playerShield = 0;
            cashStreak = 0;
            lastCashFrame = 0;
            obstacles = [];
            collectibles = [];
            particles = [];
            isPaused = false;
            
            document.getElementById('instructions').style.opacity = '0';
            document.getElementById('pauseBtn').style.display = 'flex';
        }

        function spawnObstacle() {
            const lane = Math.floor(Math.random() * 3);
            const types = ['cow', 'rickshaw', 'branch', 'police']; // Added police car for GTA feel
            const type = types[Math.floor(Math.random() * types.length)];
            
            obstacles.push({
                lane: lane,
                y: -80,
                type: type
            });
        }
        
        function spawnCollectible() {
            const lane = Math.floor(Math.random() * 3);
            const isShield = Math.random() < 0.18;
            
            collectibles.push({
                lane: lane,
                y: -80,
                type: isShield ? 'shield' : 'cash'
            });
        }

        function update() {
            if (gameState !== 'playing' || isPaused) return;
            
            frame++;
            score = Math.floor(frame * 0.45 + cash * 18);
            
            if (frame % 55 === 0 && speed < 15) speed += 0.4;
            
            // Controls (GTA driving feel)
            if ((keys['ArrowLeft'] || keys['a'] || keys['A']) && frame % 3 === 0) {
                if (playerLane > 0) playerLane--;
                keys['ArrowLeft'] = keys['a'] = keys['A'] = false;
            }
            if ((keys['ArrowRight'] || keys['d'] || keys['D']) && frame % 3 === 0) {
                if (playerLane < 2) playerLane++;
                keys['ArrowRight'] = keys['d'] = keys['D'] = false;
            }
            if ((keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' ']) && playerJump === 0) {
                playerVel = -20.5;
                playJumpSound();
                keys['ArrowUp'] = keys['w'] = keys['W'] = keys[' '] = false;
            }
            if (keys['ArrowDown'] || keys['s'] || keys['S']) {
                isSliding = true;
                slideTimer = 24;
                playDriftSound();
                keys['ArrowDown'] = keys['s'] = keys['S'] = false;
            }
            
            // Smooth lane movement
            const targetX = laneX[playerLane];
            playerX += (targetX - playerX) * 0.35;
            
            // Jump physics
            if (playerJump !== 0 || playerVel !== 0) {
                playerJump += playerVel;
                playerVel += 1.1;
                if (playerJump >= 0) {
                    playerJump = 0;
                    playerVel = 0;
                }
            }
            
            if (isSliding) {
                slideTimer--;
                if (slideTimer <= 0) isSliding = false;
            }
            
            if (playerShield > 0) playerShield--;
            
            // Spawn
            if (Math.random() < 0.052 + speed * 0.004) spawnObstacle();
            if (Math.random() < 0.033) spawnCollectible();
            
            // Move objects
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += speed;
                if (obstacles[i].y > 520) obstacles.splice(i, 1);
            }
            for (let i = collectibles.length - 1; i >= 0; i--) {
                collectibles[i].y += speed;
                if (collectibles[i].y > 520) collectibles.splice(i, 1);
            }
            
            // Collision
            const playerBaseY = 310 + playerJump;
            
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i];
                const screenY = 110 + (o.y * 0.72);
                
                if (screenY > 265 && screenY < 375 && o.lane === playerLane) {
                    if (playerShield > 0) {
                        playerShield = Math.max(0, playerShield - 90);
                        createExplosion(laneX[o.lane], screenY + 20, '#00CCFF');
                        obstacles.splice(i, 1);
                        continue;
                    }
                    
                    const isJumpingHigh = playerJump < -28;
                    
                    let hit = false;
                    if (o.type === 'branch') {
                        if (!isSliding) hit = true;
                    } else {
                        if (!isJumpingHigh) hit = true;
                    }
                    
                    if (hit) {
                        gameState = 'over';
                        if (score > highScore) {
                            highScore = score;
                            localStorage.setItem('banglaGTAHS', Math.floor(highScore));
                        }
                        createExplosion(playerX, playerBaseY - 25, '#FF2222');
                        playCrashSound();
                        document.getElementById('pauseBtn').style.display = 'none';
                        return;
                    }
                }
            }
            
            // Collectibles
            for (let i = collectibles.length - 1; i >= 0; i--) {
                const c = collectibles[i];
                const screenY = 110 + (c.y * 0.72);
                
                if (screenY > 265 && screenY < 375 && c.lane === playerLane) {
                    if (c.type === 'cash') {
                        cash++;
                        cashStreak++;
                        lastCashFrame = frame;
                        createMangoParticles(laneX[c.lane], screenY);
                        playCollectSound();
                    } else if (c.type === 'shield') {
                        playerShield = 280;
                        createMangoParticles(laneX[c.lane], screenY);
                        playPowerupSound();
                    }
                    collectibles.splice(i, 1);
                }
            }
            
            if (frame - lastCashFrame > 50) cashStreak = 0;
            
            // UI
            document.getElementById('score').textContent = Math.floor(score);
            document.getElementById('mangoCount').textContent = cash;
            
            const shieldEl = document.getElementById('shieldIndicator');
            if (playerShield > 0) {
                shieldEl.style.display = 'inline';
                shieldEl.style.opacity = (0.6 + Math.sin(frame / 3) * 0.4).toString();
            } else {
                shieldEl.style.display = 'none';
            }
            
            // Occasional engine sound
            if (frame % 18 === 0) playEngineRev();
        }

        function drawBackground() {
            // Sky
            const sky = ctx.createLinearGradient(0, 0, 0, 260);
            sky.addColorStop(0, '#87CEEB');
            sky.addColorStop(1, '#E0F7FA');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, WIDTH, 260);
            
            // Sun
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#FFEE88';
            ctx.fillStyle = '#FFCC00';
            ctx.beginPath();
            ctx.arc(680, 75, 38, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Paddy fields (GTA countryside vibe)
            ctx.fillStyle = '#006400';
            ctx.beginPath();
            ctx.moveTo(0, 260);
            ctx.quadraticCurveTo(140, 195, 340, 260);
            ctx.quadraticCurveTo(510, 185, 680, 260);
            ctx.quadraticCurveTo(820, 210, 820, 260);
            ctx.fill();
            
            // Road
            ctx.fillStyle = '#C19A6B';
            ctx.fillRect(0, 260, WIDTH, HEIGHT - 260);
            
            // Grass borders
            ctx.fillStyle = '#008000';
            ctx.fillRect(0, 260, 165, HEIGHT - 260);
            ctx.fillRect(WIDTH - 165, 260, 165, HEIGHT - 260);
            
            // Dashed lanes
            ctx.strokeStyle = '#FFF';
            ctx.lineWidth = 9;
            ctx.setLineDash([38, 38]);
            const dashOffset = (frame * speed * 1.9) % 76;
            ctx.lineDashOffset = -dashOffset;
            ctx.beginPath();
            ctx.moveTo(laneX[0] + 88, 260);
            ctx.lineTo(laneX[0] + 88, HEIGHT);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(laneX[1] + 88, 260);
            ctx.lineTo(laneX[1] + 88, HEIGHT);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Palm trees (parallax)
            bgOffset = (bgOffset + speed * 0.68) % 920;
            ctx.fillStyle = '#8B4513';
            for (let i = 0; i < 5; i++) {
                const x = ((i * 195) + bgOffset) % 1100 - 140;
                ctx.fillRect(x + 18, 205, 14, 90);
                ctx.fillStyle = '#006400';
                ctx.beginPath();
                ctx.ellipse(x + 25, 205, 42, 22, Math.PI * -0.4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(x + 25, 195, 42, 22, Math.PI * 0.4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#8B4513';
            }
            for (let i = 0; i < 5; i++) {
                const x = ((i * 195) + bgOffset * 1.35 + 380) % 1100 - 90;
                ctx.fillRect(x + 18, 205, 14, 90);
                ctx.fillStyle = '#006400';
                ctx.beginPath();
                ctx.ellipse(x + 25, 205, 42, 22, Math.PI * -0.4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(x + 25, 195, 42, 22, Math.PI * 0.4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#8B4513';
            }
        }

        function drawPlayer() {
            const x = playerX;
            let baseY = 315 + playerJump;
            
            // GTA V style sports car
            if (isSliding) baseY += 12; // lower car for drift feel
            
            // Main car body
            ctx.fillStyle = '#FF4500';
            ctx.fillRect(x - 38, baseY - 48, 76, 38);
            
            // Cabin / roof
            ctx.fillStyle = '#1C1C1C';
            ctx.fillRect(x - 26, baseY - 62, 52, 22);
            
            // Windows
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(x - 22, baseY - 58, 18, 14);
            ctx.fillRect(x + 4, baseY - 58, 18, 14);
            
            // Headlights
            ctx.fillStyle = '#FFFF88';
            ctx.fillRect(x + 32, baseY - 40, 10, 14);
            
            // Taillights
            ctx.fillStyle = '#FF2222';
            ctx.fillRect(x - 42, baseY - 40, 10, 14);
            
            // Wheels
            ctx.fillStyle = '#111111';
            ctx.beginPath();
            ctx.arc(x - 26, baseY - 8, 13, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 26, baseY - 8, 13, 0, Math.PI * 2);
            ctx.fill();
            
            // Wheel rims
            ctx.fillStyle = '#AAAAAA';
            ctx.beginPath();
            ctx.arc(x - 26, baseY - 8, 6.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 26, baseY - 8, 6.5, 0, Math.PI * 2);
            ctx.fill();
            
            // Drift smoke when sliding
            if (isSliding) {
                ctx.fillStyle = 'rgba(220,220,220,0.65)';
                ctx.fillRect(x - 45, baseY - 5, 18, 8);
                ctx.fillRect(x + 27, baseY - 5, 18, 8);
            }
            
            // Bulletproof shield effect
            if (playerShield > 0) {
                ctx.save();
                ctx.shadowBlur = 28;
                ctx.shadowColor = '#00DDFF';
                const pulse = Math.sin(frame * 0.35) * 5 + 9;
                ctx.strokeStyle = `rgba(0, 221, 255, ${0.7 + Math.sin(frame * 0.3) * 0.3})`;
                ctx.lineWidth = pulse;
                ctx.beginPath();
                ctx.arc(x, baseY - 32, 58, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }
            
            // Exhaust particles (always visible)
            if (frame % 4 === 0) createExhaustParticles(x, baseY);
        }

        function drawObstaclesAndCollectibles() {
            for (let i = 0; i < obstacles.length; i++) {
                const o = obstacles[i];
                const sy = 110 + o.y * 0.72;
                const size = 30 + (o.y * 0.1);
                const x = laneX[o.lane];
                
                if (sy < 60 || sy > HEIGHT + 20) continue;
                
                if (o.type === 'cow') {
                    ctx.fillStyle = '#F5F5F5';
                    ctx.fillRect(x - size * 0.9, sy - size * 0.6, size * 1.9, size * 0.95);
                    ctx.fillStyle = '#333';
                    ctx.fillRect(x + size * 0.6, sy - size * 0.65, size * 0.7, size * 0.6);
                    ctx.fillRect(x - size * 0.7, sy + size * 0.3, 9, size * 0.6);
                    ctx.fillRect(x - size * 0.2, sy + size * 0.3, 9, size * 0.6);
                    ctx.fillRect(x + size * 0.3, sy + size * 0.3, 9, size * 0.6);
                    ctx.fillRect(x + size * 0.8, sy + size * 0.3, 9, size * 0.6);
                } 
                else if (o.type === 'rickshaw') {
                    ctx.fillStyle = '#FF4500';
                    ctx.fillRect(x - size * 1.1, sy - size * 0.5, size * 2.1, size * 0.7);
                    ctx.fillStyle = '#FFD700';
                    ctx.fillRect(x - size * 1.3, sy - size * 0.9, size * 2.6, 18);
                    ctx.fillStyle = '#222';
                    ctx.beginPath();
                    ctx.arc(x - size * 0.6, sy + size * 0.4, size * 0.38, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x + size * 0.6, sy + size * 0.4, size * 0.38, 0, Math.PI * 2);
                    ctx.fill();
                } 
                else if (o.type === 'branch') {
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(x - size * 1.4, sy - 14, size * 2.8, 22);
                    ctx.fillStyle = '#228B22';
                    ctx.fillRect(x - size * 1.5, sy - 34, size * 0.9, 24);
                    ctx.fillRect(x + size * 0.6, sy - 34, size * 0.9, 24);
                }
                else if (o.type === 'police') {  // GTA police car
                    ctx.fillStyle = '#222';
                    ctx.fillRect(x - size * 1.05, sy - size * 0.55, size * 2.1, size * 0.75);
                    ctx.fillStyle = '#0044FF';
                    ctx.fillRect(x - size * 1.1, sy - size * 0.85, size * 2.2, 16);
                    ctx.fillStyle = '#FF0000';
                    ctx.fillRect(x - size * 0.9, sy - size * 0.95, size * 1.8, 9);
                    ctx.fillStyle = '#111';
                    ctx.beginPath();
                    ctx.arc(x - size * 0.65, sy + size * 0.35, size * 0.4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x + size * 0.65, sy + size * 0.35, size * 0.4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            // Collectibles
            for (let i = 0; i < collectibles.length; i++) {
                const c = collectibles[i];
                const sy = 110 + c.y * 0.72;
                const x = laneX[c.lane];
                const size = 24 + (c.y * 0.09);
                
                if (sy < 60 || sy > HEIGHT) continue;
                
                if (c.type === 'cash') {
                    ctx.font = `${size + 12}px Arial`;
                    ctx.fillStyle = '#FFD700';
                    ctx.fillText('💰', x - size * 0.7, sy + size * 0.6);
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = '#FFEE88';
                    ctx.fillText('💰', x - size * 0.7, sy + size * 0.6);
                    ctx.shadowBlur = 0;
                } 
                else if (c.type === 'shield') {
                    ctx.shadowBlur = 18;
                    ctx.shadowColor = '#00EEFF';
                    ctx.font = `${size * 1.95}px Arial`;
                    ctx.fillStyle = '#00CCFF';
                    ctx.fillText('🛡️', x - size * 0.85, sy + size * 0.7);
                    ctx.shadowBlur = 0;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            drawBackground();
            
            if (gameState === 'playing') {
                drawObstaclesAndCollectibles();
                drawPlayer();
                drawParticles();
                
                if (cashStreak > 4) {
                    ctx.shadowBlur = 14;
                    ctx.shadowColor = '#FFD700';
                    ctx.fillStyle = '#FFEE88';
                    ctx.font = 'bold 36px Inter';
                    ctx.textAlign = 'center';
                    ctx.fillText(`🔥 COMBO x${cashStreak} 🔥`, WIDTH / 2, 105);
                    ctx.shadowBlur = 0;
                }
            }
            
            // Start screen - GTA style
            if (gameState === 'start') {
                ctx.fillStyle = 'rgba(0, 60, 0, 0.92)';
                ctx.fillRect(0, 0, WIDTH, HEIGHT);
                
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 78px Inter';
                ctx.textAlign = 'center';
                ctx.fillText('BANGLA GTA', WIDTH / 2, 158);
                
                ctx.fillStyle = '#FF0000';
                ctx.font = '31px Inter';
                ctx.fillText('🇧🇩 GTA V STYLE VILLAGE MISSION 🇧🇩', WIDTH / 2, 222);
                
                ctx.fillStyle = '#fff';
                ctx.font = '27px Inter';
                ctx.fillText('ট্যাপ বা SPACE চাপুন শুরু করতে', WIDTH / 2, 290);
                
                ctx.font = '21px Inter';
                ctx.fillText('রিকশা • গরু • পুলিশ • ড্রিফট • র‍্যাম্প', WIDTH / 2, 335);
                ctx.fillText('GTA V এর মতো গাড়ি চালান • শিল্ড • ক্যাশ', WIDTH / 2, 365);
                
                ctx.fillStyle = '#FFD700';
                ctx.font = '20px Inter';
                ctx.fillText(`HIGH SCORE: ${highScore}`, WIDTH / 2, 415);
            }
            
            // Game Over - GTA "WASTED" style
            if (gameState === 'over') {
                ctx.fillStyle = 'rgba(180, 0, 0, 0.96)';
                ctx.fillRect(0, 0, WIDTH, HEIGHT);
                
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 82px Inter';
                ctx.textAlign = 'center';
                ctx.fillText('WASTED', WIDTH / 2, 165);
                
                ctx.fillStyle = '#fff';
                ctx.font = '34px Inter';
                ctx.fillText(`দূরত্ব: ${Math.floor(score)} মিটার`, WIDTH / 2, 235);
                ctx.fillText(`💰 ক্যাশ: ${cash}`, WIDTH / 2, 278);
                
                if (score >= highScore) {
                    ctx.fillStyle = '#FFD700';
                    ctx.font = 'bold 30px Inter';
                    ctx.fillText('🎉 নতুন রেকর্ড! 🎉', WIDTH / 2, 325);
                }
                
                ctx.fillStyle = '#fff';
                ctx.font = '27px Inter';
                ctx.fillText(`BEST: ${highScore}`, WIDTH / 2, 370);
                ctx.fillText('ট্যাপ বা R চাপুন আবার খেলতে', WIDTH / 2, 415);
                
                drawParticles();
            }
            
            if (isPaused && gameState === 'playing') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.78)';
                ctx.fillRect(0, 0, WIDTH, HEIGHT);
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 72px Inter';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', WIDTH / 2, 210);
                ctx.font = '27px Inter';
                ctx.fillStyle = '#fff';
                ctx.fillText('ট্যাপ করে চালিয়ে নিন', WIDTH / 2, 280);
                ctx.fillText('P চাপুন আবার', WIDTH / 2, 320);
            }
        }

        function gameLoop() {
            update();
            updateParticles();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ====================== INPUT ======================
        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            
            if (gameState === 'start' && (e.key === ' ' || e.key === 'Enter')) {
                startGame();
            }
            if (gameState === 'over' && e.key.toLowerCase() === 'r') {
                startGame();
            }
            if (gameState === 'playing') {
                if (e.key.toLowerCase() === 'p') {
                    isPaused = !isPaused;
                }
            }
        });
        
        window.addEventListener('keyup', e => {
            keys[e.key] = false;
        });
        
        // Mobile swipe (GTA driving feel)
        canvas.addEventListener('touchstart', e => {
            if (gameState !== 'playing' || isPaused) return;
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        });
        
        canvas.addEventListener('touchend', e => {
            if (gameState !== 'playing' || isPaused) return;
            
            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;
            
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            if (Math.abs(deltaX) > 55) {
                if (deltaX > 55 && playerLane < 2) playerLane++;
                else if (deltaX < -55 && playerLane > 0) playerLane--;
            }
            
            if (Math.abs(deltaY) > 55) {
                if (deltaY < -55 && playerJump === 0) {
                    playerVel = -20.5;
                    playJumpSound();
                } else if (deltaY > 55) {
                    isSliding = true;
                    slideTimer = 24;
                    playDriftSound();
                }
            }
        });
        
        canvas.addEventListener('click', () => {
            if (gameState === 'start' || gameState === 'over') {
                startGame();
            } else if (isPaused) {
                isPaused = false;
            }
        });
        
        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (gameState === 'playing') {
                isPaused = !isPaused;
            }
        });
        
        // Boot game
        gameLoop();
        
        console.log('%c✅ Bangla GTA (GTA V Style) loaded! Drive like a boss on Bangladeshi roads 🇧🇩🔥', 'color:#FFD700; font-size:18px; font-weight:bold');
    </script>
</body>
</html>
